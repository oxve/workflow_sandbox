name: Autoroll LTS

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      start_commit:
        description: 'The commit to start rolling from'
        required: true
        default: '7e6524981fdd6ab3c87bc55785343d40116a05e5'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  autoroll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          GH_REPO: ${{ github.server_url }}/${{ github.repository }}
        run: |
          git clone --shallow-since="5 days ago" --filter=blob:none "${GH_REPO}" .

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Autoroll
        id: autoroll
        env:
          TARGET_BRANCH: 27.lts
          # First commit
          START_COMMIT: ${{ inputs.start_commit }}
          REPO: ${{ github.repository }}
        run: |
          git fetch origin main "${TARGET_BRANCH}"
          git checkout -B "autoroll-to-${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"

          PR_LINKS=""

          # Use git rev-list to find missing commits natively on the main branch
          while read -r line; do
            COMMIT=$(echo "$line" | awk '{print $1}')
            COMMIT_SUBJECT=$(echo "$line" | cut -d' ' -f2-)

            if [[ "$COMMIT_SUBJECT" =~ ^(.*)\ \(#([0-9]+)\)$ ]]; then
              PR_TITLE="${BASH_REMATCH[1]}"
              PR_NUMBER="${BASH_REMATCH[2]}"

              if [[ -z "$(git log -1 --grep="^Cherry pick PR #${PR_NUMBER}:" "origin/${TARGET_BRANCH}")" ]]; then
                mainline_arg=""
                if [[ $(git show -s --format=%P "${COMMIT}" | wc -w) -gt 1 ]]; then
                  mainline_arg="--mainline=1"
                fi
                git cherry-pick --no-commit ${mainline_arg} "${COMMIT}" || {
                  echo "::error::Failed to cherry pick ${COMMIT}"
                  exit 1
                }

                AUTHOR_NAME="$(git log -1 --format=%an "${COMMIT}")"
                AUTHOR_EMAIL="$(git log -1 --format=%ae "${COMMIT}")"
                AUTHOR_DATE="$(git log -1 --format=%ad "${COMMIT}")"

                git commit --no-verify --author="${AUTHOR_NAME} <${AUTHOR_EMAIL}>" --date="${AUTHOR_DATE}" -F - <<EOF
          Cherry pick PR #${PR_NUMBER}: ${PR_TITLE}

          Refer to the original PR: https://github.com/${REPO}/pull/${PR_NUMBER}

          $(git log -1 --format=%b "${COMMIT}")
          EOF

                PR_LINKS="${PR_LINKS}- https://github.com/${REPO}/pull/${PR_NUMBER}"$'\n'
              fi
            fi
          done < <(git rev-list --no-merges --oneline --reverse "origin/main" "^origin/${TARGET_BRANCH}" "${START_COMMIT}^..origin/main")

          # Pass PR_LINKS as an output if not empty
          if [[ -n "$PR_LINKS" ]]; then
            EOF_MARKER="EOF_$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)"
            echo "pr_links<<${EOF_MARKER}" >> $GITHUB_OUTPUT
            echo "$PR_LINKS" >> $GITHUB_OUTPUT
            echo "${EOF_MARKER}" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.autoroll.outputs.pr_links != ''
        uses: peter-evans/create-pull-request@2b011faafdcbc9ceb11414d64d0573f37c774b04 # v4.2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: 27.lts
          branch: autoroll-to-27.lts
          title: "Autoroll from main to 27.lts"
          body: |
            Automated cherry-pick roll to 27.lts.

            Original pull requests:
            ${{ steps.autoroll.outputs.pr_links }}
