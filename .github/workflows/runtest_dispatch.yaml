name: Rerun checks if 'runtest' Label is present
on:
  pull_request:
    types: [labeled]

permissions: read-all

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Handle 'runtest' label
        # Use array contains to check if runtest is on PR since it's removed at the end.
        if: contains(github.event.pull_request.labels.*.name, 'runtest')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -ex
          PR_SHA=$(gh pr view "${PR_NUMBER}" --json headRefOid -q .headRefOid)

          # Iterate over run IDs and their paths to determine which ones use main.yaml
          gh api "/repos/${GH_REPO}/actions/runs?head_sha=${PR_SHA}" -q '.workflow_runs[] | "\(.id) \(.path)"' | while read RUN_ID RUN_PATH; do
            # Ensure the referenced workflow uses main.yaml dynamically.
            if [[ -f "${RUN_PATH}" ]] && grep -qE 'uses:[[:space:]]+(\./)?\.github/workflows/main\.yaml' "${RUN_PATH}"; then
              # Cancel current running jobs.
              if [[ "$(gh run view "${RUN_ID}" --json status -q '.status')" == "in_progress" ]]; then
                gh run cancel "${RUN_ID}" || echo "Failed to cancel ${RUN_ID}."
              fi
              # Rerun jobs.
              gh run rerun "${RUN_ID}" || echo "Failed to rerun ${RUN_ID}."
            fi
          done

          gh pr edit "${PR_NUMBER}" --remove-label "runtest" || true
